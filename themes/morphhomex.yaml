  card-mod-root-yaml: |
    .: |
      ha-card[outlined] {
        --ha-card-border-color: #d0d0d0 !important;
        --ha-card-border-width: 1px !important;
      }
      ha-picker-field,
      ha-combo-box,
      ha-combo-box-item,
      ha-dropdown-item,
      ha-textfield,
      ha-select,
      ha-md-select,
      ha-md-textfield {
        --mdc-text-field-fill-color: #e8e8e8 !important;
        --mdc-text-field-disabled-fill-color: #e8e8e8 !important;
        --mdc-select-fill-color: #e8e8e8 !important;
        --mdc-select-disabled-fill-color: #e8e8e8 !important;
        --mdc-text-field-ink-color: #2c2f3a !important;
        --mdc-select-ink-color: #2c2f3a !important;
        --md-filled-field-container-color: #e8e8e8 !important;
        --md-filled-text-field-container-color: #e8e8e8 !important;
        --md-outlined-text-field-container-color: #e8e8e8 !important;
        --md-filled-select-text-field-container-color: #e8e8e8 !important;
        --ha-color-fill-neutral-quiet-resting: #e8e8e8 !important;
        --ha-color-fill-neutral-normal-resting: #e8e8e8 !important;
        background-color: #e8e8e8 !important;
        color: #2c2f3a !important;
      }
      ha-picker-field {
        border-radius: 14px !important;
      }
  card-mod-sidebar-yaml: |
    .: |
      .badge {
        background-color: #6c7ae0 !important;
        color: #ffffff !important;
      }
